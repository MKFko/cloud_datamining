<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Risk Assessment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1a237e;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .input-field {
            display: flex;
            flex-direction: column;
        }

        .input-field label {
            color: #1a237e;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .input-field input {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-field input:focus {
            outline: none;
            border-color: #667eea;
        }

        .unit {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #f5f5f5;
            color: #333;
        }

        .btn-reset:hover {
            background: #eeeeee;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.high-risk {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }

        .result.low-risk {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }

        .result h3 {
            margin-bottom: 10px;
        }

        .result.high-risk h3 {
            color: #c62828;
        }

        .result.low-risk h3 {
            color: #2e7d32;
        }

        .result p {
            font-size: 14px;
            line-height: 1.6;
        }

        .result.high-risk p {
            color: #d32f2f;
        }

        .result.low-risk p {
            color: #388e3c;
        }

        .warning-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚕️ Diabetes Risk Assessment</h1>
            <p>Enter your health metrics for a preliminary diabetes risk evaluation</p>
        </div>

        <form id="diabetesForm">
            <div class="form-group">
                <div class="input-field">
                    <label for="bmi">BMI</label>
                    <input type="number" id="bmi" step="0.1" placeholder="Enter BMI">
                    <span class="unit">kg/m²</span>
                </div>
                <div class="input-field">
                    <label for="glucose">Glucose</label>
                    <input type="number" id="glucose" step="0.1" placeholder="Enter glucose level">
                    <span class="unit">mg/dL</span>
                </div>
            </div>

            <div class="form-group">
                <div class="input-field">
                    <label for="insulin">Insulin</label>
                    <input type="number" id="insulin" step="0.1" placeholder="Enter insulin level">
                    <span class="unit">µU/mL</span>
                </div>
                <div class="input-field">
                    <label for="age">Age</label>
                    <input type="number" id="age" step="1" placeholder="Enter age">
                    <span class="unit">years</span>
                </div>
            </div>

            <div class="form-group">
                <div class="input-field">
                    <label for="diabetes_pedigree">Diabetes Pedigree</label>
                    <input type="number" id="diabetes_pedigree" step="0.0001" placeholder="Enter pedigree function">
                </div>
                <div class="input-field">
                    <label for="skinfold">Skinfold Thickness</label>
                    <input type="number" id="skinfold" step="0.1" placeholder="Enter skinfold thickness">
                    <span class="unit">mm</span>
                </div>
            </div>

            <div class="form-group full">
                <div class="input-field">
                    <label for="blood_pressure">Blood Pressure</label>
                    <input type="number" id="blood_pressure" step="0.1" placeholder="Enter blood pressure">
                    <span class="unit">mmHg</span>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-analyze">Analyze Risk</button>
                <button type="reset" class="btn-reset">Clear</button>
            </div>
        </form>

        <div id="result" class="result">
            <div class="warning-icon" id="resultIcon"></div>
            <h3 id="resultTitle"></h3>
            <p id="resultMessage"></p>
            <p id="resultRecommendation" style="margin-top: 10px; font-style: italic;"></p>
        </div>
    </div>

    <script src="predict.js"></script>
</body>
</html>
