<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Risk Assessment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            max-width: 650px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1a237e;
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 15px;
            line-height: 1.5;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .input-field {
            display: flex;
            flex-direction: column;
        }

        .label-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .input-field label {
            color: #1a237e;
            font-weight: 600;
            font-size: 13px;
        }

        .help-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: help;
            position: relative;
        }

        .help-tooltip {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: #333;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            display: none;
            z-index: 10;
            margin-bottom: 5px;
        }

        .help-icon:hover .help-tooltip {
            display: block;
        }

        .input-field input {
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .input-field input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .unit {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 13px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.35);
        }

        .btn-analyze:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: #f5f5f5;
            color: #333;
        }

        .btn-reset:hover {
            background: #eeeeee;
            transform: translateY(-2px);
        }

        .result {
            margin-top: 30px;
            padding: 24px;
            border-radius: 12px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .result.show {
            display: block;
        }

        .result.high-risk {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            border-left: 5px solid #f44336;
        }

        .result.low-risk {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-left: 5px solid #4caf50;
        }

        .result h3 {
            margin-bottom: 12px;
            font-size: 20px;
        }

        .result.high-risk h3 {
            color: #c62828;
        }

        .result.low-risk h3 {
            color: #2e7d32;
        }

        .result p {
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .result.high-risk p {
            color: #b71c1c;
        }

        .result.low-risk p {
            color: #1b5e20;
        }

        .warning-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .result-emphasis {
            font-weight: 600;
            opacity: 0.9;
        }

        .error-message {
            background: #ffcdd2;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            font-size: 14px;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .form-group {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚕️ Diabetes Risk Assessment</h1>
            <p>Enter your health metrics for a preliminary diabetes risk evaluation</p>
        </div>

        <form id="diabetesForm">
            <div class="form-group">
                <div class="input-field">
                    <div class="label-wrapper">
                        <label for="bmi">BMI</label>
                        <div class="help-icon">?
                            <span class="help-tooltip">Body Mass Index (kg/m²)</span>
                        </div>
                    </div>
                    <input type="number" id="bmi" step="0.1" placeholder="Enter BMI" required>
                    <span class="unit">kg/m²</span>
                </div>
                <div class="input-field">
                    <div class="label-wrapper">
                        <label for="glucose">Glucose</label>
                        <div class="help-icon">?
                            <span class="help-tooltip">Blood glucose level</span>
                        </div>
                    </div>
                    <input type="number" id="glucose" step="0.1" placeholder="Enter glucose level" required>
                    <span class="unit">mg/dL</span>
                </div>
            </div>

            <div class="form-group">
                <div class="input-field">
                    <div class="label-wrapper">
                        <label for="insulin">Insulin</label>
                        <div class="help-icon">?
                            <span class="help-tooltip">Serum insulin level</span>
                        </div>
                    </div>
                    <input type="number" id="insulin" step="0.1" placeholder="Enter insulin level" required>
                    <span class="unit">µU/mL</span>
                </div>
                <div class="input-field">
                    <div class="label-wrapper">
                        <label for="age">Age</label>
                        <div class="help-icon">?
                            <span class="help-tooltip">Your age in years</span>
                        </div>
                    </div>
                    <input type="number" id="age" step="1" placeholder="Enter age" required>
                    <span class="unit">years</span>
                </div>
            </div>

            <div class="form-group">
                <div class="input-field">
                    <div class="label-wrapper">
                        <label for="diabetes_pedigree">Diabetes Pedigree</label>
                        <div class="help-icon">?
                            <span class="help-tooltip">Family history function</span>
                        </div>
                    </div>
                    <input type="number" id="diabetes_pedigree" step="0.0001" placeholder="Enter pedigree function" required>
                </div>
                <div class="input-field">
                    <div class="label-wrapper">
                        <label for="skinfold">Skinfold</label>
                        <div class="help-icon">?
                            <span class="help-tooltip">Triceps skinfold grip</span>
                        </div>
                    </div>
                    <input type="number" id="skinfold" step="0.1" placeholder="Enter skinfold thickness" required>
                    <span class="unit">mm</span>
                </div>
            </div>

            <div class="form-group full">
                <div class="input-field">
                    <div class="label-wrapper">
                        <label for="blood_pressure">Blood Pressure</label>
                        <div class="help-icon">?
                            <span class="help-tooltip">Diastolic blood pressure</span>
                        </div>
                    </div>
                    <input type="number" id="blood_pressure" step="0.1" placeholder="Enter blood pressure" required>
                    <span class="unit">mmHg</span>
                </div>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="button-group">
                <button type="submit" class="btn-analyze">Analyze Risk</button>
                <button type="reset" class="btn-reset">Clear</button>
            </div>
        </form>

        <div id="result" class="result">
            <div class="warning-icon" id="resultIcon"></div>
            <h3 id="resultTitle"></h3>
            <p id="resultMessage"></p>
            <p id="resultRecommendation" style="margin-top: 10px; font-style: italic;"></p>
        </div>
    </div>

    <script src="predict.js"></script>
</body>
</html>
